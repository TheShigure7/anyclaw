<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnyClaw Plugin Market</title>
<style>
:root {
  --bg: #0f1117;
  --bg-card: #1a1d27;
  --bg-input: #252836;
  --border: #2d3142;
  --text: #e4e6f0;
  --text-dim: #8b8fa3;
  --accent: #6c5ce7;
  --accent-hover: #7c6ff7;
  --success: #00cec9;
  --warning: #fdcb6e;
  --danger: #ff7675;
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
header h1 { font-size: 28px; font-weight: 700; }
header h1 span { color: var(--accent); }

.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  background: var(--bg-input);
  border-radius: var(--radius);
  padding: 4px;
  width: fit-content;
}
.tab {
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-dim);
  transition: all 0.2s;
  border: none;
  background: none;
}
.tab:hover { color: var(--text); }
.tab.active { background: var(--accent); color: white; }

.search-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
}
.search-bar input {
  flex: 1;
  padding: 12px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 15px;
  outline: none;
}
.search-bar input:focus { border-color: var(--accent); }
.search-bar select {
  padding: 12px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px;
  outline: none;
  min-width: 150px;
}

.plugin-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

.plugin-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all 0.2s;
  cursor: pointer;
}
.plugin-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}
.plugin-card .header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}
.plugin-card .name {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}
.plugin-card .version {
  font-size: 12px;
  color: var(--text-dim);
  background: var(--bg-input);
  padding: 2px 8px;
  border-radius: 4px;
}
.plugin-card .desc {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 16px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.plugin-card .meta {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 16px;
}
.plugin-card .meta span { display: flex; align-items: center; gap: 4px; }
.plugin-card .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.plugin-card .tag {
  font-size: 11px;
  padding: 3px 8px;
  background: var(--bg-input);
  border-radius: 4px;
  color: var(--text-dim);
}
.plugin-card .actions { display: flex; gap: 8px; }

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--bg-input); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { opacity: 0.9; }
.btn-success { background: var(--success); color: var(--bg); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.badge {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
}
.badge-verified { background: rgba(0, 206, 201, 0.15); color: var(--success); }
.badge-installed { background: rgba(108, 92, 231, 0.15); color: var(--accent); }

.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  max-width: 600px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h2 { margin-bottom: 16px; }
.modal .detail-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.modal .detail-row .label { color: var(--text-dim); }
.modal .actions { margin-top: 24px; display: flex; gap: 8px; justify-content: flex-end; }

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  z-index: 2000;
  animation: slideIn 0.3s ease;
}
.toast.success { border-left: 4px solid var(--success); }
.toast.error { border-left: 4px solid var(--danger); }

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty-state h3 { margin-bottom: 8px; color: var(--text); }

.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-dim);
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span>AnyClaw</span> Plugin Market</h1>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" onclick="refreshMarket()">Refresh</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="browse" onclick="switchTab('browse')">Browse</button>
    <button class="tab" data-tab="installed" onclick="switchTab('installed')">Installed</button>
  </div>

  <div id="browseView">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search plugins..." oninput="debounceSearch()">
      <select id="categoryFilter" onchange="loadPlugins()">
        <option value="">All Categories</option>
        <option value="channel">Channel</option>
        <option value="tool">Tool</option>
        <option value="mcp">MCP</option>
        <option value="skill">Skill</option>
        <option value="app">App</option>
        <option value="model-provider">Model Provider</option>
        <option value="speech">Speech</option>
      </select>
      <select id="sortFilter" onchange="loadPlugins()">
        <option value="downloads">Most Downloads</option>
        <option value="stars">Most Stars</option>
        <option value="name">Name A-Z</option>
      </select>
    </div>
    <div id="pluginGrid" class="plugin-grid"></div>
    <div id="browseLoading" class="loading" style="display:none;">Loading plugins...</div>
  </div>

  <div id="installedView" style="display:none;">
    <div id="installedGrid" class="plugin-grid"></div>
    <div id="installedLoading" class="loading" style="display:none;">Loading installed plugins...</div>
  </div>
</div>

<div class="modal-overlay" id="pluginModal">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <div id="modalContent"></div>
    <div class="actions">
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" id="modalAction" onclick="modalInstall()">Install</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="rollbackModal">
  <div class="modal">
    <h2>Rollback Plugin</h2>
    <div id="rollbackContent"></div>
    <div class="actions">
      <button class="btn btn-secondary" onclick="closeRollbackModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let currentTab = 'browse';
let currentPlugin = null;
let searchTimeout = null;
let installedPlugins = new Set();

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('browseView').style.display = tab === 'browse' ? 'block' : 'none';
  document.getElementById('installedView').style.display = tab === 'installed' ? 'block' : 'none';
  if (tab === 'installed') loadInstalled();
  else loadPlugins();
}

function debounceSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(loadPlugins, 300);
}

async function loadPlugins() {
  const grid = document.getElementById('pluginGrid');
  const loading = document.getElementById('browseLoading');
  grid.innerHTML = '';
  loading.style.display = 'block';

  const q = document.getElementById('searchInput').value;
  const cat = document.getElementById('categoryFilter').value;
  const sort = document.getElementById('sortFilter').value;

  try {
    const resp = await fetch(`${API}/market/search?q=${encodeURIComponent(q)}&category=${cat}&sort=${sort}&limit=50`);
    const data = await resp.json();
    loading.style.display = 'none';

    if (!data.plugins || data.plugins.length === 0) {
      grid.innerHTML = '<div class="empty-state"><h3>No plugins found</h3><p>Try a different search or category</p></div>';
      return;
    }

    data.plugins.forEach(p => renderPluginCard(grid, p, false));
  } catch (e) {
    loading.style.display = 'none';
    grid.innerHTML = '<div class="empty-state"><h3>Failed to load</h3><p>' + e.message + '</p></div>';
  }
}

async function loadInstalled() {
  const grid = document.getElementById('installedGrid');
  const loading = document.getElementById('installedLoading');
  grid.innerHTML = '';
  loading.style.display = 'block';

  try {
    const resp = await fetch(`${API}/market/installed`);
    const data = await resp.json();
    loading.style.display = 'none';

    if (!data.installed || data.installed.length === 0) {
      grid.innerHTML = '<div class="empty-state"><h3>No plugins installed</h3><p>Browse the market to find and install plugins</p></div>';
      return;
    }

    data.installed.forEach(p => {
      const card = document.createElement('div');
      card.className = 'plugin-card';
      card.innerHTML = `
        <div class="header">
          <div>
            <div class="name">${p.plugin_id || p.name}</div>
            <span class="version">v${p.version}</span>
            <span class="badge badge-installed">Installed</span>
          </div>
        </div>
        <div class="meta">
          <span>Installed: ${new Date(p.installed_at).toLocaleDateString()}</span>
          <span>Source: ${p.source || 'local'}</span>
        </div>
        <div class="actions">
          <button class="btn btn-secondary" onclick="updatePlugin('${p.plugin_id}')">Update</button>
          <button class="btn btn-secondary" onclick="showRollbackModal('${p.plugin_id}')">Rollback</button>
          <button class="btn btn-danger" onclick="uninstallPlugin('${p.plugin_id}')">Uninstall</button>
        </div>
      `;
      grid.appendChild(card);
    });
  } catch (e) {
    loading.style.display = 'none';
    grid.innerHTML = '<div class="empty-state"><h3>Failed to load</h3><p>' + e.message + '</p></div>';
  }
}

function renderPluginCard(grid, p, isInstalled) {
  const card = document.createElement('div');
  card.className = 'plugin-card';
  card.onclick = () => showPluginDetail(p);

  const tags = (p.tags || []).slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('');
  const verified = p.verified ? '<span class="badge badge-verified">Verified</span>' : '';
  const installed = isInstalled || installedPlugins.has(p.plugin_id) ? '<span class="badge badge-installed">Installed</span>' : '';

  card.innerHTML = `
    <div class="header">
      <div>
        <div class="name">${p.name || p.plugin_id}</div>
        <span class="version">v${p.version || 'latest'}</span>
        ${verified} ${installed}
      </div>
    </div>
    <div class="desc">${p.description || 'No description available'}</div>
    <div class="meta">
      <span>Downloads: ${p.downloads || 0}</span>
      <span>Stars: ${p.stars || 0}</span>
      ${p.author ? `<span>By ${p.author}</span>` : ''}
    </div>
    ${tags ? `<div class="tags">${tags}</div>` : ''}
    <div class="actions">
      <button class="btn btn-primary" onclick="event.stopPropagation(); installPlugin('${p.plugin_id}', '${p.version || ''}')">Install</button>
    </div>
  `;
  grid.appendChild(card);
}

function showPluginDetail(p) {
  currentPlugin = p;
  document.getElementById('modalTitle').textContent = p.name || p.plugin_id;
  document.getElementById('modalContent').innerHTML = `
    <p style="color:var(--text-dim);margin-bottom:16px;">${p.description || 'No description'}</p>
    <div class="detail-row"><span class="label">Version</span><span>${p.version || 'latest'}</span></div>
    <div class="detail-row"><span class="label">Author</span><span>${p.author || 'Unknown'}</span></div>
    <div class="detail-row"><span class="label">License</span><span>${p.license || 'N/A'}</span></div>
    <div class="detail-row"><span class="label">Downloads</span><span>${p.downloads || 0}</span></div>
    <div class="detail-row"><span class="label">Stars</span><span>${p.stars || 0}</span></div>
    <div class="detail-row"><span class="label">Verified</span><span>${p.verified ? 'Yes' : 'No'}</span></div>
    ${p.tags && p.tags.length ? `<div class="detail-row"><span class="label">Tags</span><span>${p.tags.join(', ')}</span></div>` : ''}
    ${p.dependencies && p.dependencies.length ? `<div class="detail-row"><span class="label">Dependencies</span><span>${p.dependencies.join(', ')}</span></div>` : ''}
  `;
  const isInstalled = installedPlugins.has(p.plugin_id);
  const actionBtn = document.getElementById('modalAction');
  if (isInstalled) {
    actionBtn.textContent = 'Update';
    actionBtn.onclick = () => updatePlugin(p.plugin_id);
  } else {
    actionBtn.textContent = 'Install';
    actionBtn.onclick = () => installPlugin(p.plugin_id, p.version || '');
  }
  document.getElementById('pluginModal').classList.add('active');
}

function closeModal() {
  document.getElementById('pluginModal').classList.remove('active');
  currentPlugin = null;
}

async function installPlugin(id, version) {
  showToast('Installing ' + id + '...', 'success');
  try {
    const url = version ? `${API}/market/plugins/${id}/install?version=${version}` : `${API}/market/plugins/${id}/install`;
    const resp = await fetch(url, { method: 'POST' });
    const data = await resp.json();
    if (data.error) {
      showToast('Install failed: ' + data.error, 'error');
    } else {
      installedPlugins.add(id);
      showToast('Installed ' + id + ' v' + data.version, 'success');
      loadPlugins();
    }
  } catch (e) {
    showToast('Install failed: ' + e.message, 'error');
  }
  closeModal();
}

async function updatePlugin(id) {
  showToast('Updating ' + id + '...', 'success');
  try {
    const resp = await fetch(`${API}/market/plugins/${id}/update`, { method: 'POST' });
    const data = await resp.json();
    if (data.error) {
      showToast('Update failed: ' + data.error, 'error');
    } else {
      showToast('Updated ' + id + ' to v' + data.version, 'success');
      loadInstalled();
    }
  } catch (e) {
    showToast('Update failed: ' + e.message, 'error');
  }
  closeModal();
}

async function uninstallPlugin(id) {
  if (!confirm('Uninstall ' + id + '?')) return;
  showToast('Uninstalling ' + id + '...', 'success');
  try {
    const resp = await fetch(`${API}/market/plugins/${id}/uninstall`, { method: 'POST' });
    const data = await resp.json();
    if (data.error) {
      showToast('Uninstall failed: ' + data.error, 'error');
    } else {
      installedPlugins.delete(id);
      showToast('Uninstalled ' + id, 'success');
      loadInstalled();
    }
  } catch (e) {
    showToast('Uninstall failed: ' + e.message, 'error');
  }
}

function refreshMarket() {
  loadPlugins();
}

function showToast(message, type) {
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

async function showRollbackModal(id) {
  try {
    const resp = await fetch(`${API}/market/plugins/${id}/history`);
    const data = await resp.json();
    if (data.error) {
      showToast('Failed to load history: ' + data.error, 'error');
      return;
    }
    const history = data.history || [];
    if (history.length <= 1) {
      showToast('No previous versions available for rollback', 'error');
      return;
    }
    let html = `<p style="color:var(--text-dim);margin-bottom:16px;">Select a version to rollback to:</p>`;
    const currentVersion = history[history.length - 1]?.version;
    html += `<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">`;
    for (let i = history.length - 2; i >= 0; i--) {
      const h = history[i];
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg-input);border-radius:8px;">
        <div>
          <div style="font-weight:600;">v${h.version}</div>
          <div style="font-size:12px;color:var(--text-dim);">Installed: ${new Date(h.installed_at).toLocaleString()}</div>
        </div>
        <button class="btn btn-secondary" onclick="rollbackPlugin('${id}', '${h.version}')">Rollback</button>
      </div>`;
    }
    html += `</div>`;
    document.getElementById('rollbackContent').innerHTML = html;
    document.getElementById('rollbackModal').classList.add('active');
  } catch (e) {
    showToast('Failed to load history: ' + e.message, 'error');
  }
}

function closeRollbackModal() {
  document.getElementById('rollbackModal').classList.remove('active');
}

async function rollbackPlugin(id, version) {
  showToast('Rolling back ' + id + ' to v' + version + '...', 'success');
  try {
    const resp = await fetch(`${API}/market/plugins/${id}/rollback?version=${version}`, { method: 'POST' });
    const data = await resp.json();
    if (data.error) {
      showToast('Rollback failed: ' + data.error, 'error');
    } else {
      showToast('Rolled back ' + id + ' from v' + data.from_version + ' to v' + data.to_version, 'success');
      closeRollbackModal();
      loadInstalled();
    }
  } catch (e) {
    showToast('Rollback failed: ' + e.message, 'error');
  }
}

document.getElementById('rollbackModal').addEventListener('click', function(e) {
  if (e.target === this) closeRollbackModal();
});

document.getElementById('pluginModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadPlugins();
</script>
</body>
</html>

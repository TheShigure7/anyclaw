<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnyClaw LAN Discovery</title>
<style>
:root {
  --bg: #0f1117;
  --bg-card: #1a1d27;
  --bg-input: #252836;
  --border: #2d3142;
  --text: #e4e6f0;
  --text-dim: #8b8fa3;
  --accent: #6c5ce7;
  --accent-hover: #7c6ff7;
  --success: #00cec9;
  --warning: #fdcb6e;
  --danger: #ff7675;
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.container { max-width: 900px; margin: 0 auto; padding: 24px; }

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
header h1 { font-size: 28px; font-weight: 700; }
header h1 span { color: var(--accent); }

.self-card {
  background: linear-gradient(135deg, rgba(108,92,231,0.15), rgba(108,92,231,0.05));
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
}
.self-card h2 {
  font-size: 18px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.self-card h2::before {
  content: "";
  width: 10px;
  height: 10px;
  background: var(--success);
  border-radius: 50%;
  display: inline-block;
}
.self-card .info {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  font-size: 14px;
}
.self-card .info .item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.self-card .info .label { color: var(--text-dim); font-size: 12px; }
.self-card .info .value { font-weight: 500; }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.section-header h2 { font-size: 20px; font-weight: 600; }

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--bg-input); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); }

.instance-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.instance-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all 0.2s;
}
.instance-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}
.instance-card .name {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.instance-card .status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.instance-card .status-dot.online { background: var(--success); }
.instance-card .version {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 12px;
}
.instance-card .details {
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 13px;
  margin-bottom: 12px;
}
.instance-card .details .row {
  display: flex;
  justify-content: space-between;
}
.instance-card .details .row .label { color: var(--text-dim); }
.instance-card .caps {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 12px;
}
.instance-card .cap {
  font-size: 11px;
  padding: 2px 6px;
  background: var(--bg-input);
  border-radius: 4px;
  color: var(--text-dim);
}
.instance-card .actions {
  display: flex;
  gap: 8px;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  grid-column: 1 / -1;
}
.empty-state h3 { margin-bottom: 8px; color: var(--text); }

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  z-index: 2000;
  animation: slideIn 0.3s ease;
}
.toast.success { border-left: 4px solid var(--success); }
.toast.error { border-left: 4px solid var(--danger); }

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span>AnyClaw</span> LAN Discovery</h1>
  </header>

  <div id="selfCard" class="self-card" style="display:none;">
    <h2>This Instance</h2>
    <div class="info">
      <div class="item"><span class="label">Name</span><span class="value" id="selfName"></span></div>
      <div class="item"><span class="label">URL</span><span class="value" id="selfUrl"></span></div>
      <div class="item"><span class="label">Version</span><span class="value" id="selfVersion"></span></div>
      <div class="item"><span class="label">Capabilities</span><span class="value" id="selfCaps"></span></div>
    </div>
  </div>

  <div class="section-header">
    <h2>Discovered Instances</h2>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" onclick="queryDiscovery()">Scan Network</button>
      <button class="btn btn-secondary" onclick="loadInstances()">Refresh</button>
    </div>
  </div>

  <div id="instanceGrid" class="instance-grid"></div>
</div>

<script>
const API = window.location.origin;
let refreshInterval = null;

async function loadInstances() {
  try {
    const resp = await fetch(`${API}/discovery/instances`);
    const data = await resp.json();
    renderInstances(data.instances || []);
  } catch (e) {
    console.error('Failed to load instances:', e);
  }
}

async function queryDiscovery() {
  try {
    await fetch(`${API}/discovery/query`, { method: 'POST' });
    showToast('Network scan initiated', 'success');
    setTimeout(loadInstances, 2000);
  } catch (e) {
    showToast('Scan failed: ' + e.message, 'error');
  }
}

function renderInstances(instances) {
  const grid = document.getElementById('instanceGrid');
  grid.innerHTML = '';

  const selfInstances = instances.filter(i => i.is_self);
  const peerInstances = instances.filter(i => !i.is_self);

  if (selfInstances.length > 0) {
    const self = selfInstances[0];
    document.getElementById('selfCard').style.display = 'block';
    document.getElementById('selfName').textContent = self.name;
    document.getElementById('selfUrl').textContent = self.url;
    document.getElementById('selfVersion').textContent = 'v' + (self.version || 'unknown');
    document.getElementById('selfCaps').textContent = (self.capabilities || []).join(', ');
  }

  if (peerInstances.length === 0) {
    grid.innerHTML = '<div class="empty-state"><h3>No instances discovered</h3><p>Click "Scan Network" to search for AnyClaw instances on your LAN</p></div>';
    return;
  }

  peerInstances.forEach(inst => {
    const card = document.createElement('div');
    card.className = 'instance-card';

    const caps = (inst.capabilities || []).slice(0, 5).map(c => `<span class="cap">${c}</span>`).join('');
    const lastSeen = inst.last_seen ? new Date(inst.last_seen).toLocaleTimeString() : 'unknown';

    card.innerHTML = `
      <div class="name">
        <span class="status-dot online"></span>
        ${inst.name || inst.id}
      </div>
      <div class="version">v${inst.version || 'unknown'}</div>
      <div class="details">
        <div class="row"><span class="label">URL</span><span class="value">${inst.url || 'N/A'}</span></div>
        <div class="row"><span class="label">Address</span><span class="value">${inst.address || 'N/A'}</span></div>
        <div class="row"><span class="label">Last Seen</span><span class="value">${lastSeen}</span></div>
      </div>
      ${caps ? `<div class="caps">${caps}</div>` : ''}
      <div class="actions">
        ${inst.url ? `<button class="btn btn-primary" onclick="window.open('${inst.url}', '_blank')">Open</button>` : ''}
        <button class="btn btn-secondary" onclick="copyUrl('${inst.url}')">Copy URL</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function copyUrl(url) {
  if (url) {
    navigator.clipboard.writeText(url).then(() => showToast('URL copied to clipboard', 'success'));
  }
}

function showToast(message, type) {
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

loadInstances();
refreshInterval = setInterval(loadInstances, 10000);
</script>
</body>
</html>
